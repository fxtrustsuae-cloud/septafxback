<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Trust API Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            max-width: 700px;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #007bff;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        a {
            color: #007bff;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Fx Trust API Server</h1>
        <p>Welcome to the <strong>Fx Trust API Server</strong>.  
        This server provides secure and fast API endpoints to access all Fx Trust functionalities.</p>
        <p>If you have any questions or need assistance, feel free to  
        <a href="mailto:prakashkr2609@gmail.com">contact us</a>.</p>
    </div>
</body>
</html>
